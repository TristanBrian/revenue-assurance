services:
  db:
    image: postgres:16
    container_name: kpc-db
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=kpc_app
      - POSTGRES_PASSWORD=kpc_local_dev
      - POSTGRES_DB=kpc_db
    volumes:
      - kpc-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpc_app -d kpc_db"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kpc-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - /app/__pycache__
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg2://kpc_app:kpc_local_dev@db:5432/kpc_db
    depends_on:
      db:
        condition: service_healthy
    # ✅ Use the start.sh script (file-existence check + all steps)
    command: /app/scripts/start.sh
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kpc-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  kpc-db-data: