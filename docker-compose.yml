services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kpc-backend
    # Host networking (Linux only): container shares the host's network namespace,
    # so DATABASE_URL's "localhost:5432" in .env resolves to the host's actual
    # Postgres — same as running the app outside Docker. Avoids widening Postgres's
    # listen_addresses/pg_hba.conf just for local dev. `ports:` is a no-op under
    # host networking (the app binds directly to the host's port), so it's dropped.
    network_mode: host
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - /app/__pycache__  # Ignore cache
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "python scripts/generate_kpc_data.py &&
             python scripts/etl_pipeline.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kpc-frontend
    # Same host-networking rationale as the backend service: the backend
    # also uses network_mode: host, which means it doesn't get a
    # container-internal "backend" DNS name, so NEXT_PUBLIC_API_URL has to
    # reach it via localhost — only possible if frontend is on host
    # networking too. `ports:` is a no-op under host networking, so it's
    # dropped (matches the backend service above).
    network_mode: host
    volumes:
      - ./frontend:/app
      - /app/node_modules  # don't overwrite container's node_modules with host's
      - /app/.next
    env_file:
      - .env
    depends_on:
      - backend
    stdin_open: true
    tty: true