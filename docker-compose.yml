services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kpc-backend
    network_mode: host
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - /app/__pycache__
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: ./scripts/start.sh
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kpc-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend